<style>

/* ===== PAGE ===== */
html, body {
    height: 100%;
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;

    background: url("../images/hero.png") center/cover no-repeat;
}

body::before {
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    z-index:-1;
}

/* ===== NAVBAR ===== */
.navbar {
    display:flex;
    align-items:center;
    gap:20px;
    padding:15px 25px;
    background:rgba(17,24,39,0.9);
    position:sticky;
    top:0;
    backdrop-filter:blur(10px);
    z-index:1000;
}

.navbar a {
    color:white;
    text-decoration:none;
    transition:0.2s;
}

.navbar a:hover {
    color:#f59e0b;
}

.logo {
    font-weight:bold;
    color:#f59e0b;
    margin-right:auto;
}

/* ===== SECTION ===== */
.section {
    max-width: 900px;
    margin: 40px auto;
    padding: 25px;

    background: rgba(17, 24, 39, 0.85);
    border-radius: 14px;

    backdrop-filter: blur(10px);
    border-left: 4px solid #f59e0b;

    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    animation: fadeIn 0.6s ease;
}

.section h2 {
    margin-top:0;
    color:#f59e0b;
}

.section h3 {
    color:#f59e0b;
    margin-top:20px;
}

/* ===== FORM ===== */
label {
    display:block;
    margin-top:12px;
    margin-bottom:6px;
    color:#f59e0b;
    font-weight:bold;
}

input, textarea {
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    outline:none;

    background: rgba(255,255,255,0.08);
    color:white;
    transition:0.2s;
}

input:focus, textarea:focus {
    background: rgba(255,255,255,0.15);
    box-shadow: 0 0 10px #f59e0b;
}

/* ===== BUTTON ===== */
button {
    margin-top:15px;
    padding:12px 18px;
    background:#f59e0b;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover {
    transform:scale(1.05);
    box-shadow:0 0 15px #f59e0b;
}

/* ===== ANIMATION ===== */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}

</style>
<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">WesternLight</div>

    <a href="index.html">Головна</a>
    <a href="services.html">Послуги</a>
    <a href="jobs.html">Робота</a>
    <a href="fleet.html">Автопарк</a>
    <a href="contacts.html">Контакти</a>
</nav>

<div class="section">
    <h2>Замовлення послуг</h2>

    <!-- ДОСТАВКА -->
    <h3 style="color:#f59e0b; margin-top:10px;">🚚 Замовити доставку</h3>

    <form>
        <label>Ім’я клієнта</label>
        <input type="text" placeholder="Введіть ім’я">

        <label>Адреса доставки</label>
        <input type="text" placeholder="Введіть адресу">

        <label>Тип вантажу</label>
        <input type="text" placeholder="Наприклад: продукти, техніка">

        <label>Коментар</label>
        <textarea placeholder="Додаткова інформація"></textarea>

        <button type="submit">Створити замовлення</button>
    </form>

    <hr style="margin:30px 0; opacity:0.2;">

    <!-- ВОДИТЕЛЬ -->
    <h3 style="color:#f59e0b;">🚗 Замовити водія на захід</h3>

    <form>
        <label>Ім’я замовника</label>
        <input type="text" placeholder="Введіть ім’я">

        <label>Тип заходу</label>
        <input type="text" placeholder="Весілля / вечірка / RP подія">

        <label>Дата та час</label>
        <input type="text" placeholder="20.06.2026 18:00">

        <label>Місце подачі авто</label>
        <input type="text" placeholder="Адреса">

        <label>Кількість пасажирів</label>
        <input type="number">

        <label>Коментар</label>
        <textarea placeholder="Побажання"></textarea>

        <button type="submit">Замовити водія</button>
    </form>
</div>

<script>
const webhookURL = "https://discord.com/api/webhooks/1515477953365016727/BQOo30012UyZlAOg0lFUVjnh7UozZH5rQ72zWfqAg4QPzR__ea84PIj6j8dYszlKnSDZ";

// ФОРМА 1 — ДОСТАВКА
document.querySelectorAll("form")[0].addEventListener("submit", async (e) => {
    e.preventDefault();

    const inputs = e.target.querySelectorAll("input, textarea");

    const data = {
        "Ім'я клієнта": inputs[0].value,
        "Адреса": inputs[1].value,
        "Тип вантажу": inputs[2].value,
        "Коментар": inputs[3].value
    };

    await sendToDiscord("🚚 НОВЕ ЗАМОВЛЕННЯ ДОСТАВКИ", data);
});

// ФОРМА 2 — ВОДІЙ НА ЗАХІД
document.querySelectorAll("form")[1].addEventListener("submit", async (e) => {
    e.preventDefault();

    const inputs = e.target.querySelectorAll("input, textarea");

    const data = {
        "Ім'я замовника": inputs[0].value,
        "Тип заходу": inputs[1].value,
        "Дата та час": inputs[2].value,
        "Місце": inputs[3].value,
        "Кількість пасажирів": inputs[4].value,
        "Коментар": inputs[5].value
    };

    await sendToDiscord("🚗 ЗАМОВЛЕННЯ ВОДІЯ НА ЗАХІД", data);
});

// ОТПРАВКА В DISCORD
async function sendToDiscord(title, data) {
    const fields = Object.entries(data).map(([key, value]) => {
        return {
            name: key,
            value: value || "немає даних",
            inline: false
        };
    });

    const payload = {
        embeds: [{
            title: title,
            color: 16753920,
            fields: fields,
            footer: {
                text: "WesternLight Logistics"
            }
        }]
    };

    await fetch(webhookURL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
    });

    alert("Заявку відправлено в Discord!");
}
</script>
