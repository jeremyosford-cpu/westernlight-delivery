<style>

/* ===== PAGE ===== */
html, body {
    height: 100%;
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;

    background: url("../images/hero.png") center/cover no-repeat;
}

body::before {
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    z-index:-1;
}

/* ===== NAVBAR ===== */
.navbar {
    display:flex;
    align-items:center;
    gap:20px;
    padding:15px 25px;
    background:rgba(17,24,39,0.9);
    position:sticky;
    top:0;
    backdrop-filter:blur(10px);
    z-index:1000;
}

.navbar a {
    color:white;
    text-decoration:none;
    transition:0.2s;
}

.navbar a:hover {
    color:#f59e0b;
}

.logo {
    font-weight:bold;
    color:#f59e0b;
    margin-right:auto;
}

/* ===== SECTION ===== */
.section {
    max-width: 900px;
    margin: 40px auto;
    padding: 25px;

    background: rgba(17, 24, 39, 0.85);
    border-radius: 14px;

    backdrop-filter: blur(10px);
    border-left: 4px solid #f59e0b;

    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    animation: fadeIn 0.6s ease;
}

.section h2 {
    margin-top:0;
    color:#f59e0b;
}

.section h3 {
    color:#f59e0b;
    margin-top:20px;
}

/* ===== FORM ===== */
label {
    display:block;
    margin-top:12px;
    margin-bottom:6px;
    color:#f59e0b;
    font-weight:bold;
}

input, textarea {
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    outline:none;

    background: rgba(255,255,255,0.08);
    color:white;
    transition:0.2s;
}

input:focus, textarea:focus {
    background: rgba(255,255,255,0.15);
    box-shadow: 0 0 10px #f59e0b;
}

/* ===== BUTTON ===== */
button {
    margin-top:15px;
    padding:12px 18px;
    background:#f59e0b;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover {
    transform:scale(1.05);
    box-shadow:0 0 15px #f59e0b;
}

/* ===== ANIMATION ===== */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}

</style>
<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">WesternLight</div>

    <a href="index.html">Головна</a>
    <a href="services.html">Послуги</a>
    <a href="jobs.html">Робота</a>
    <a href="fleet.html">Автопарк</a>
    <a href="contacts.html">Контакти</a>
</nav>

<div class="section">
    <h2>Замовлення послуг</h2>

    <!-- ДОСТАВКА -->
    <h3 style="color:#f59e0b; margin-top:10px;">🚚 Замовити доставку</h3>

    <form>
        <label>Ім’я клієнта</label>
        <input type="text" placeholder="Введіть ім’я">

        <label>Адреса доставки</label>
        <input type="text" placeholder="Введіть адресу">

        <label>Тип вантажу</label>
        <input type="text" placeholder="Наприклад: продукти, техніка">

        <label>Коментар</label>
        <textarea placeholder="Додаткова інформація"></textarea>

        <button type="submit">Створити замовлення</button>
    </form>

    <hr style="margin:30px 0; opacity:0.2;">

    <!-- ВОДИТЕЛЬ -->
    <h3 style="color:#f59e0b;">🚗 Замовити водія на захід</h3>

    <form>
        <label>Ім’я замовника</label>
        <input type="text" placeholder="Введіть ім’я">

        <label>Тип заходу</label>
        <input type="text" placeholder="Весілля / вечірка / RP подія">

        <label>Дата та час</label>
        <input type="text" placeholder="20.06.2026 18:00">

        <label>Місце подачі авто</label>
        <input type="text" placeholder="Адреса">

        <label>Кількість пасажирів</label>
        <input type="number">

        <label>Коментар</label>
        <textarea placeholder="Побажання"></textarea>

        <button type="submit">Замовити водія</button>
    </form>
</div>

<script>
const webhookURL = "https://discord.com/api/webhooks/1515477953365016727/BQOo30012UyZlAOg0lFUVjnh7UozZH5rQ72zWfqAg4QPzR__ea84PIj6j8dYszlKnSDZ";

// анти-спам
let canSend = true;

/* ===== ID ЗАЯВКИ ===== */
function generateID() {
    return "WL-" + Math.floor(Math.random() * 100000);
}

/* ===== ДОСТАВКА ===== */
document.getElementById("deliveryForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    if (!canSend) return;

    canSend = false;

    const btn = e.target.querySelector("button");
    btn.disabled = true;
    btn.innerText = "Відправка...";

    const i = e.target.querySelectorAll("input, textarea");

    const data = {
        "ID заявки": generateID(),
        "Статус": "🟡 Очікує обробки",
        "Ім'я клієнта": i[0].value,
        "Адреса": i[1].value,
        "Тип вантажу": i[2].value,
        "Коментар": i[3].value
    };

    await sendToDiscord("🚚 НОВЕ ЗАМОВЛЕННЯ ДОСТАВКИ", data);

    e.target.reset();

    btn.innerText = "✔ Відправлено";
    setTimeout(() => {
        btn.innerText = "Створити замовлення";
        btn.disabled = false;
        canSend = true;
    }, 3000);
});

/* ===== ВОДІЙ ===== */
document.getElementById("driverForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    if (!canSend) return;

    canSend = false;

    const btn = e.target.querySelector("button");
    btn.disabled = true;
    btn.innerText = "Відправка...";

    const i = e.target.querySelectorAll("input, textarea");

    const data = {
        "ID заявки": generateID(),
        "Статус": "🟡 Очікує обробки",
        "Ім'я замовника": i[0].value,
        "Тип заходу": i[1].value,
        "Дата та час": i[2].value,
        "Місце": i[3].value,
        "Кількість пасажирів": i[4].value,
        "Коментар": i[5].value
    };

    await sendToDiscord("🚗 ЗАМОВЛЕННЯ ВОДІЯ НА ЗАХІД", data);

    e.target.reset();

    btn.innerText = "✔ Відправлено";
    setTimeout(() => {
        btn.innerText = "Замовити водія";
        btn.disabled = false;
        canSend = true;
    }, 3000);
});

/* ===== DISCORD SEND ===== */
async function sendToDiscord(title, data) {

    const fields = Object.entries(data).map(([key, value]) => ({
        name: key,
        value: value || "немає даних",
        inline: false
    }));

    const payload = {
        embeds: [{
            title: title,
            color: 0xf59e0b,
            fields: fields,
            footer: {
                text: "WesternLight Logistics • RP System"
            },
            timestamp: new Date().toISOString()
        }]
    };

    try {
        await fetch(webhookURL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

    } catch (err) {
        alert("Помилка відправки!");
        console.error(err);
    }
}
</script>
