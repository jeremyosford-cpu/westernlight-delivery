<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>WesternLight Logistics</title>

<style>
/* ===== PAGE ===== */
html, body {
    height: 100%;
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: url("../images/hero.png") center/cover no-repeat;
}

body::before {
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    z-index:-1;
}

/* ===== NAVBAR ===== */
.navbar {
    display:flex;
    align-items:center;
    gap:20px;
    padding:15px 25px;
    background:rgba(17,24,39,0.9);
    position:sticky;
    top:0;
    backdrop-filter:blur(10px);
    z-index:1000;
}

.navbar a {
    color:white;
    text-decoration:none;
}

.logo {
    font-weight:bold;
    color:#f59e0b;
    margin-right:auto;
}

/* ===== SECTION ===== */
.section {
    max-width: 900px;
    margin: 40px auto;
    padding: 25px;
    background: rgba(17,24,39,0.85);
    border-radius: 14px;
    border-left: 4px solid #f59e0b;
}

/* ===== FORM ===== */
label {
    display:block;
    margin-top:12px;
    color:#f59e0b;
    font-weight:bold;
}

input, textarea {
    width:100%;
    padding:12px;
    margin-top:5px;
    border:none;
    border-radius:8px;
    background: rgba(255,255,255,0.08);
    color:white;
}

/* ===== BUTTON ===== */
button {
    margin-top:15px;
    padding:12px 18px;
    background:#f59e0b;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

/* ===== PANEL ===== */
.order {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    margin-top: 10px;
    border-radius: 10px;
    border-left: 4px solid #f59e0b;
}

.order button {
    margin: 5px 5px 0 0;
    padding: 6px 10px;
    font-size: 12px;
}
</style>
</head>

<body>

<nav class="navbar">
<div class="logo">WesternLight</div>
<a href="#">Головна</a>
<a href="#">Послуги</a>
<a href="#">Робота</a>
</nav>

<div class="section">
<h2>🚚 Доставка</h2>

<form id="deliveryForm">
<label>Ім’я</label>
<input type="text">

<label>Адреса</label>
<input type="text">

<label>Тип вантажу</label>
<input type="text">

<label>Коментар</label>
<textarea></textarea>

<button>Відправити</button>
</form>
</div>

<div class="section">
<h2>🚗 Водій</h2>

<form id="driverForm">
<label>Ім’я</label>
<input type="text">

<label>Подія</label>
<input type="text">

<label>Час</label>
<input type="text">

<label>Місце</label>
<input type="text">

<label>Пасажири</label>
<input type="number">

<label>Коментар</label>
<textarea></textarea>

<button>Відправити</button>
</form>
</div>

<div class="section">
<h2>📊 Панель диспетчера</h2>
<div id="orders"></div>
</div>

<script>
const webhookURL = "ТВОЙ_WEBHOOK";

let canSend = true;
let orders = JSON.parse(localStorage.getItem("orders") || "[]");

function generateID() {
    return "WL-" + Math.floor(Math.random() * 100000);
}

/* ===== DISCORD ===== */
async function sendToDiscord(title, data) {

    const fields = Object.entries(data).map(([k,v]) => ({
        name: k,
        value: v || "немає",
        inline: false
    }));

    fetch(webhookURL, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            embeds:[{
                title,
                color: 0xf59e0b,
                fields,
                footer:{text:"WesternLight RP"},
                timestamp:new Date()
            }]
        })
    });
}

/* ===== SAVE ===== */
function addOrder(type, data) {
    orders.push({
        id: generateID(),
        type,
        status:"🟡 Очікує",
        data
    });

    localStorage.setItem("orders", JSON.stringify(orders));
    render();
}

/* ===== RENDER ===== */
function render() {
    const box = document.getElementById("orders");
    box.innerHTML = "";

    orders.forEach((o,i)=>{
        box.innerHTML += `
        <div class="order">
            <b>ID:</b> ${o.id}<br>
            <b>Тип:</b> ${o.type}<br>
            <b>Статус:</b> ${o.status}<br>

            <button onclick="setStatus(${i},'🟡 Очікує')">Очікує</button>
            <button onclick="setStatus(${i},'🔵 В роботі')">В роботі</button>
            <button onclick="setStatus(${i},'🟢 Готово')">Готово</button>
            <button onclick="setStatus(${i},'🔴 Відхилено')">Відхилити</button>
        </div>`;
    });
}

/* ===== STATUS ===== */
function setStatus(i,status){
    orders[i].status = status;
    localStorage.setItem("orders", JSON.stringify(orders));
    render();
}

/* ===== FORMS ===== */
document.getElementById("deliveryForm").addEventListener("submit",(e)=>{
    e.preventDefault();

    const i = e.target.querySelectorAll("input,textarea");

    const data = {
        "Ім'я": i[0].value,
        "Адреса": i[1].value,
        "Тип": i[2].value,
        "Коментар": i[3].value
    };

    sendToDiscord("🚚 Доставка", data);
    addOrder("Доставка", data);

    e.target.reset();
});

document.getElementById("driverForm").addEventListener("submit",(e)=>{
    e.preventDefault();

    const i = e.target.querySelectorAll("input,textarea");

    const data = {
        "Ім'я": i[0].value,
        "Подія": i[1].value,
        "Час": i[2].value,
        "Місце": i[3].value,
        "Пасажири": i[4].value,
        "Коментар": i[5].value
    };

    sendToDiscord("🚗 Водій", data);
    addOrder("Водій", data);

    e.target.reset();
});

render();
</script>

</body>
</html>
