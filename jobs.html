<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>WesternLight</title>

<style>

/* ===== BODY / BACKGROUND ===== */
html, body {
    height: 100%;
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;

    background: url("../images/hero.png") center/cover no-repeat;
}

/* затемнение фона */
body::before {
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    z-index:-1;
}

/* ===== NAVBAR ===== */
.navbar {
    display:flex;
    align-items:center;
    gap:20px;
    padding:15px 25px;
    background:rgba(17,24,39,0.9);
    position:sticky;
    top:0;
    backdrop-filter:blur(10px);
    z-index:1000;
}

.navbar a {
    color:white;
    text-decoration:none;
    transition:0.2s;
}

.navbar a:hover {
    color:#f59e0b;
}

.logo {
    font-weight:bold;
    color:#f59e0b;
    margin-right:auto;
}

/* ===== SECTIONS ===== */
.section {
    max-width: 900px;
    margin: 40px auto;
    padding: 25px;

    background: rgba(17, 24, 39, 0.85);
    border-radius: 14px;

    backdrop-filter: blur(10px);
    border-left: 4px solid #f59e0b;

    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    animation: fadeIn 0.6s ease;
}

.section h2 {
    margin-top: 0;
    color: #f59e0b;
}

/* ===== FORMS ===== */
label {
    display:block;
    margin-top:12px;
    margin-bottom:6px;
    color:#f59e0b;
    font-weight:bold;
}

input, textarea {
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    outline:none;

    background: rgba(255,255,255,0.08);
    color:white;
    transition:0.2s;
}

input:focus, textarea:focus {
    background: rgba(255,255,255,0.15);
    box-shadow: 0 0 10px #f59e0b;
}

/* ===== BUTTON ===== */
button {
    margin-top:15px;
    padding:12px 18px;
    background:#f59e0b;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover {
    transform:scale(1.05);
    box-shadow:0 0 15px #f59e0b;
}

/* ===== ANIMATION ===== */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">WesternLight</div>

    <a href="index.html">Головна</a>
    <a href="services.html">Послуги</a>
    <a href="jobs.html">Робота</a>
    <a href="fleet.html">Автопарк</a>
    <a href="contacts.html">Контакти</a>
</nav>

<!-- 1 FORM -->
<div class="section">
    <h2>Заявка на роботу водієм</h2>

    <form>
        <label>Ім'я та прізвище</label>
        <input type="text">

        <label>Вік</label>
        <input type="number">

        <label>Досвід роботи (RP)</label>
        <textarea></textarea>

        <label>Discord</label>
        <input type="text">

        <button type="submit">Відправити заявку</button>
    </form>
</div>

<!-- 2 FORM -->
<div class="section">
    <h2>Заявка на пасажирські перевезення</h2>

    <form>
        <label>Ім'я та прізвище</label>
        <input type="text">

        <label>Вік</label>
        <input type="number">

        <label>Чому хочете працювати?</label>
        <textarea></textarea>

        <label>Досвід RP / таксі</label>
        <textarea></textarea>

        <label>Discord</label>
        <input type="text">

        <button type="submit">Подати заявку</button>
    </form>
</div>

</body>
</html>
